<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Operação</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#030303;
    overflow:hidden;
    color:#00ff9c;
    font-family:'Share Tech Mono', monospace;

}

/* Fundo animado */

body::before{

content:"";

position:fixed;
width:100%;
height:100%;

background:
radial-gradient(circle at center, rgba(0,255,150,.08), transparent 70%);

animation:pulse 4s infinite;

}

@keyframes pulse{

0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}

}

/* Scanlines */

.scan{

position:fixed;
width:100%;
height:100%;

background:linear-gradient(
rgba(255,255,255,.02) 50%,
transparent 50%);

background-size:100% 4px;

pointer-events:none;

opacity:.4;

}

.container{

position:absolute;
top:50%;
left:50%;

transform:translate(-50%,-50%);

width:90%;
max-width:900px;

padding:45px;

background:rgba(0,0,0,.72);

border:1px solid #00ff88;

box-shadow:0 0 25px rgba(0,255,140,.35);

backdrop-filter:blur(8px);

}

h1{

text-align:center;

font-size:46px;

margin-bottom:25px;

color:white;

letter-spacing:6px;

text-shadow:0 0 20px #00ff88;

animation:flicker 4s infinite;

}

@keyframes flicker{

0%,18%,22%,25%,53%,57%,100%{

opacity:1;

}

20%,24%,55%{

opacity:.5;

}

}

#countdown{

font-size:70px;

text-align:center;

margin-bottom:35px;

color:#00ff88;

text-shadow:0 0 20px #00ff88;

}

#text{

white-space:pre-wrap;

font-size:21px;

line-height:1.8;

min-height:320px;

}

.cursor{

display:inline-block;

width:12px;

height:25px;

background:#00ff88;

animation:blink .8s infinite;

}

@keyframes blink{

50%{
opacity:0;
}

}

.footer{

margin-top:35px;

text-align:center;

color:#666;

font-size:14px;

letter-spacing:2px;

}

.glitch{

animation:glitch .08s infinite;

}

@keyframes glitch{

0%{transform:translate(1px);}
50%{transform:translate(-1px);}
100%{transform:translate(1px);}

}

</style>
</head>
<body>

<div class="scan"></div>

<div class="container">

<h1>INÍCIO DA OPERAÇÃO</h1>

<div id="countdown"></div>

<div id="text"></div>

<div class="footer">
CANAL SEGURO • ACESSO RESTRITO
</div>

</div>

<script>

const operationTime = new Date().getTime() + 60000;

const countdown = document.getElementById("countdown");

const text = document.getElementById("text");

const message = `O momento chegou.

Meses de informações desencontradas, contatos infiltrados e movimentações silenciosas finalmente convergem para um único ponto. A partir de agora, cada decisão terá consequências, cada aliança poderá ser colocada à prova e cada passo poderá mudar o rumo da operação.

Quando o relógio marcar a hora, não haverá mais espaço para dúvidas. Apenas estratégia, coragem e determinação.

Que os preparados prevaleçam, que os erros sejam poucos e que a sorte acompanhe aqueles que estiverem dispostos a arriscar tudo.

Boa sorte a todos.

A operação está oficialmente iniciada.`;

const interval = setInterval(() => {

let distance = operationTime - new Date().getTime();

if(distance <= 0){

clearInterval(interval);

countdown.innerHTML="OPERAÇÃO INICIADA";

countdown.classList.add("glitch");

setTimeout(typeWriter,800);

return;

}

let min = Math.floor(distance/60000);

let sec = Math.floor((distance%60000)/1000);

countdown.innerHTML =
String(min).padStart(2,"0")
+
":"
+
String(sec).padStart(2,"0");

},1000);

let i=0;

function typeWriter(){

if(i<message.length){

text.innerHTML=
message.substring(0,i)
+
"<span class='cursor'></span>";

i++;

setTimeout(typeWriter,30);

}else{

text.innerHTML=message;

}

}

</script>

</body>
</html>
